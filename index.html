<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="robots" content="noindex">
  <title>BRF | Painel de Vídeos</title>
</head>

<body>
  <!-- VIDEO -->
  <div class="video light-bg" data-selector="videoContainer">
    <h2 class="video-clipTitle t-label brf-orange-bg light-tx" data-selector="clipTitle" data-show="false"></h2>
    <div class="video-loading" data-selector="loading"></div>
    <button class="t-backButtonLabel brf-red1-bg" data-selector="closeVideoBtn">
      <svg xmlns="http://www.w3.org/2000/svg" width="30" height="29" fill="none" viewBox="0 0 30 29">
        <path fill="var(--light)" d="M.586 4.233a2 2 0 0 1-.003-2.826L1.4.588a2 2 0 0 1 2.832 0L28.4 24.802a2 2 0 0 1-.016 2.841l-.797.78a2 2 0 0 1-2.814-.013z" />
        <path fill="var(--light)" d="M28.433 4.233a2 2 0 0 0 .003-2.826L27.62.588a2 2 0 0 0-2.833 0L.62 24.802a2 2 0 0 0 .016 2.841l.797.78a2 2 0 0 0 2.813-.013z" />
      </svg>
    </button>
    <video src="/video.mp4" preload="metadata" disablePictureInPicture data-selector="video"></video>
  </div>

  <!-- MAINSCREEN -->
  <main class="mainScreen active">

    <!-- TITLE -->
    <h1 class="title brf-red1-tx t-title">Processos do Frigorífico de Aves</h1>

    <!-- APP -->
    <section class="timestampSelection">
      <button class="timestampSelection-button light-tx brf-orange-bg t-fullVideoButtonLabel" data-selector="seeAllVideoBtn">Assista o vídeo completo</button>
      <div class="timestampSelection-decorator brf-red2-bg"></div>

      <!-- VIDEO LIST -->
      <div class="timestamps">
        <h2 class="dark-tx t-secondaryTitle">Clique e assista individualmente cada processo</h2>
        <ul data-selector="timestampList">
        </ul>
      </div>
    </section>

  </main>

  <script src="src/main.ts" type="module"></script>
</body>

</html>
